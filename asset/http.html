<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTTP Debugger</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:#e2e8f0; padding:20px }
    .card { background:#1e293b; padding:15px; border-radius:12px; margin-bottom:15px }
    input, textarea, select {
      width:100%; padding:8px; margin-top:6px;
      background:#020617; color:#e2e8f0; border:1px solid #334155; border-radius:8px;
      font-family: monospace;
    }
    button {
      padding:10px; border:none; border-radius:10px;
      background:#38bdf8; color:black; font-weight:bold; cursor:pointer;
      margin-top:10px;
    }
    pre {
      background:#020617; padding:10px; border-radius:8px;
      overflow:auto; font-size:12px;
    }
  </style>
</head>
<body>

  <h2>HTTP Debugger (Insomnia-lite)</h2>

  <div class="card">
    <label>Method</label>
    <select id="method">
      <option>GET</option>
      <option>POST</option>
      <option>PUT</option>
      <option>PATCH</option>
      <option>DELETE</option>
    </select>

    <label>URL</label>
    <input id="url" placeholder="https://api.example.com">

    <label>Headers (JSON)</label>
    <textarea id="headers" rows="4">{}</textarea>

    <label>Body</label>
    <textarea id="body" rows="4"></textarea>

    <button onclick="sendRequest()">Send Request</button>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status">-</div>

    <h3>Headers</h3>
    <pre id="resHeaders"></pre>

    <h3>Body</h3>
    <pre id="resBody"></pre>
  </div>

<script>
async function sendRequest() {
  const url = document.getElementById('url').value;
  const method = document.getElementById('method').value;
  const headersText = document.getElementById('headers').value;
  const body = document.getElementById('body').value;

  let headers = {};
  try {
    headers = headersText ? JSON.parse(headersText) : {};
  } catch (e) {
    alert('Invalid JSON in headers');
    return;
  }

  document.getElementById('status').innerText = 'Loading...';

  try {
    const res = await fetch(url, {
      method,
      headers,
      body: (method !== 'GET' && method !== 'HEAD') ? body : undefined
    });

    const text = await res.text();

    let formatted;
    try {
      formatted = JSON.stringify(JSON.parse(text), null, 2);
    } catch {
      formatted = text;
    }

    document.getElementById('status').innerText = res.status + ' ' + res.statusText;
    document.getElementById('resHeaders').innerText = JSON.stringify(Object.fromEntries(res.headers.entries()), null, 2);
    document.getElementById('resBody').innerText = formatted;

  } catch (err) {
    document.getElementById('status').innerText = 'Error: ' + err.message;
  }
}
</script>

</body>
</html>
